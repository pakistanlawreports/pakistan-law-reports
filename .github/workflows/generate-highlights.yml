name: Generate case highlights

# Runs weekly, generating a small batch of new genuine case highlights each
# time. Can also be triggered manually from the Actions tab to test it.
on:
  schedule:
    - cron: '0 6 * * 1'  # every Monday at 6am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-highlights:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate highlights
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_highlights.py

      - name: Commit new highlights (if any)
        run: |
          git config user.name "PLR Auto-Update Bot"
          git config user.email "actions@github.com"
          git add data/case_highlights.json
          git diff --cached --quiet && echo "No changes to commit." || git commit -m "Auto-generate new case highlights"
          git push
