name: Update Sindh High Court judgments

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Run scraper
        run: python scrape_shc.py

      - name: Commit new judgments (if any)
        run: |
          git config user.name "PLR Auto-Update Bot"
          git config user.email "actions@github.com"
          git add data/shc_judgments.json data/shc_seen.json
          git diff --cached --quiet && echo "No changes to commit." || git commit -m "Auto-update: new SHC judgments $(date +'%Y-%m-%d')"
          git push
